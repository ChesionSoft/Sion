name: Desktop

on:
  push:
    branches: [codex/desktop-rust]
    paths:
      - "desktop/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "fixtures/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "fixtures/**"
      - ".github/workflows/desktop.yml"

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runner: macos-15
          - label: macOS Intel
            runner: macos-15-intel
          - label: Windows x64
            runner: windows-2022
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Set up Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Install UI dependencies
        run: npm ci
      - name: Validate migration fixture
        working-directory: .
        run: node fixtures/validate-fixtures.mjs
      - name: Check UI
        run: npm run lint && npm run build
      - name: Check Rust
        run: |
          cargo fmt --all --check --manifest-path ../Cargo.toml
          cargo clippy --workspace --manifest-path ../Cargo.toml -- -D warnings
          cargo test --workspace --manifest-path ../Cargo.toml
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
          npm run test:rust
      - name: Verify system credential store
        run: npm run test:keyring && npm run test:provider-migration
      - name: Build desktop integration
        run: npm run build:desktop
      - name: Bundle macOS application
        if: runner.os == 'macOS'
        run: npm run bundle

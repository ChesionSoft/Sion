name: Desktop

on:
  push:
    branches: [codex/desktop-rust]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "fixtures/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "src/**"
      - "src-tauri/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "fixtures/**"
      - ".github/workflows/desktop.yml"

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runner: macos-15
            bundle_path: src-tauri/target/universal-apple-darwin/release/bundle/
          - label: macOS Intel
            runner: macos-15-intel
            bundle_path: src-tauri/target/release/bundle/
          - label: Windows x64
            runner: windows-2022
            bundle_path: src-tauri/target/release/bundle/
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Set up Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Install universal macOS Rust targets
        if: matrix.label == 'macOS Apple Silicon'
        shell: bash
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Install UI dependencies
        run: npm ci
      - name: Validate migration fixture
        working-directory: .
        run: node fixtures/validate-fixtures.mjs
      - name: Verify browserless desktop runtime
        run: npm run test:no-browser-runtime
      - name: Check UI
        run: npm run lint && npm run build
      - name: Check Rust
        run: |
          cargo fmt --all --check --manifest-path Cargo.toml
          cargo clippy --workspace --manifest-path Cargo.toml -- -D warnings
          cargo test --workspace --manifest-path Cargo.toml
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
          npm run test:rust
      - name: Verify system credential store
        run: npm run test:keyring && npm run test:provider-migration
      - name: Build desktop integration
        run: npm run build:desktop
      - name: Bundle universal macOS application
        if: matrix.label == 'macOS Apple Silicon'
        run: npm run bundle:mac-universal
      - name: Bundle Intel macOS application
        if: matrix.label == 'macOS Intel'
        run: npm run bundle:mac
      - name: Bundle Windows installers
        if: runner.os == 'Windows'
        run: npm run bundle:windows
      - name: Upload desktop bundles
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: sion-${{ matrix.label }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error

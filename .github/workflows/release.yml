# Build unsigned desktop installers and attach them to a GitHub Release.
# Trigger: push a version tag matching v* (e.g. v1.0.0).
#
# Artifacts (unsigned development verification packages):
#   - macOS Universal DMG (Apple Silicon + Intel)
#   - Windows NSIS .exe and WiX .msi
#
# Signing/notarization secrets are intentionally not used here.
# See RELEASE.md for formal distribution requirements.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (e.g. v1.0.0). Leave empty to use the current ref."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles app,dmg
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: --bundles nsis,msi
            rust_targets: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: sion-desktop-${{ matrix.platform }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Install WiX Toolset (Windows MSI)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          choco install wixtoolset --version=3.14.1 -y --no-progress
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Sion ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            ## Sion ${{ github.event.inputs.tag || github.ref_name }}

            Local-first desktop workbench for structured product design delivery.

            ### Downloads

            | Platform | Installer |
            | --- | --- |
            | macOS (Apple Silicon + Intel) | Universal `.dmg` |
            | Windows x64 | NSIS `.exe` and WiX `.msi` |

            ### Notes

            - These are **unsigned development verification packages**.
            - macOS: open via right-click → Open if Gatekeeper blocks the first launch.
            - Windows: SmartScreen may warn on unsigned installers; choose “More info” → “Run anyway”.
            - Formal distribution with code signing and Apple notarization is documented in `RELEASE.md`.

            ### Requirements

            - macOS 11.0+
            - Windows 10/11 x64
            - A local LLM provider API key (configured in-app under Settings)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

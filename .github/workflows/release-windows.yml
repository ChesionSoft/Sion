# Temporary Windows NSIS builder for an existing GitHub Release tag.
# Keep off main after the one-shot build (repo policy: .github is local-only).
name: Release Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (e.g. v1.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: sion-desktop-windows-latest

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Windows NSIS to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.event.inputs.tag }}
          releaseName: Sion ${{ github.event.inputs.tag }}
          releaseBody: |
            ## Sion ${{ github.event.inputs.tag }}

            Local-first desktop workbench for structured product design delivery.

            ### Downloads

            | Platform | Installer |
            | --- | --- |
            | macOS (Apple Silicon + Intel) | Universal `.dmg` |
            | Windows x64 | NSIS `.exe` |

            ### Notes

            - These are **unsigned development verification packages**.
            - macOS: open via right-click → Open if Gatekeeper blocks the first launch.
            - Windows: SmartScreen may warn on unsigned installers; choose “More info” → “Run anyway”.
            - Formal distribution with code signing and Apple notarization is documented in `RELEASE.md`.

            ### Requirements

            - macOS 11.0+
            - Windows 10/11 x64
            - A local LLM provider API key (configured in-app under Settings)
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
